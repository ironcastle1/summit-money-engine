<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Summit Money Engine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="/styles/base.css" />
  <link rel="stylesheet" href="/styles/layout.css" />
  <link rel="stylesheet" href="/styles/map.css" />
  <link rel="stylesheet" href="/styles/panels.css" />
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="brand"><span class="dot"></span><div><h1>SITUATION ROOM</h1><p>live money map · events · routes · rapid movers</p></div></div>
      <div id="ticker" class="ticker">loading market tape...</div>
      <div id="status" class="status">booting</div>
    </header>
    <nav class="menu">
      <button data-panel="markets">MARKETS</button>
      <button data-panel="signals">SIGNALS</button>
      <button data-panel="rapid">RAPID RISE</button>
      <button data-panel="charts">CHARTS</button>
      <button data-layer="sea">SEA ROUTES</button>
      <button data-layer="land">LAND ROUTES</button>
      <button data-filter="all" class="active">ALL</button>
      <button data-filter="war">WAR</button>
      <button data-filter="disaster">DISASTER</button>
      <button data-filter="election">ELECTION</button>
      <button data-filter="shipping">SHIPPING</button>
      <button data-filter="tech">TECH</button>
      <button id="refresh">REFRESH</button>
    </nav>
    <main class="stage">
      <section id="map"></section>
      <aside id="marketsPanel" class="panel left"><button class="close" data-close="markets">×</button><h2>MARKETS</h2><div id="markets"></div><h3>POLYMARKET</h3><div id="poly"></div></aside>
      <aside id="signalsPanel" class="panel right"><button class="close" data-close="signals">×</button><h2>SIGNALS</h2><div id="signals"></div></aside>
      <aside id="rapidPanel" class="drawer"><button class="close" data-close="rapid">×</button><h2>RAPID RISE</h2><p class="sub">Assets moving now. Each card lists reason, odds estimate, source status and checks.</p><div id="rapid"></div></aside>
      <aside id="chartsPanel" class="drawer charts"><button class="close" data-close="charts">×</button><h2>CHARTS</h2><div id="charts"></div></aside>
      <aside id="contextPanel" class="context"><button class="close" data-close="context">×</button><h2 id="contextTitle">COUNTRY</h2><div id="contextBody"></div></aside>
      <div id="legend" class="legend"></div>
      <div id="toast" class="toast"></div>
    </main>
    <footer><div id="marquee">waiting for live signals...</div></footer>
  </div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="/js/components/panels.js"></script>
  <script src="/js/components/renderers.js"></script>
  <script src="/js/components/charting.js"></script>
  <script src="/js/components/map.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
